name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Python Image
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          file: ./python-service/Dockerfile
          push: true
          tags: sebazahwy/python-service:latest

      - name: Build and Push NodeJS Image
        uses: docker/build-push-action@v6
        with:
          context: ./nodejs-servics
          file: ./nodejs-servics/Dockerfile
          push: true
          tags: sebazahwy/nodejs-servics:latest

      - name: Build and Push DotNet Image
        uses: docker/build-push-action@v6
        with:
          context: ./dotnet-service
          file: ./dotnet-service/Dockerfile
          push: true
          tags: sebazahwy/dotnet-service:latest